<svg xmlns="http://www.w3.org/2000/svg" width="120" height="120" viewBox="0 0 120 120">
  <g fill="#E8B339" stroke="#E8B339">
    <!-- diamond lattice (tiles seamlessly via edge midpoints) -->
    <path d="M60 0 L120 60 L60 120 L0 60 Z" fill="none" stroke-width="1"/>
    <path d="M60 26 L94 60 L60 94 L26 60 Z" fill="none" stroke-width="0.7" opacity="0.7"/>
    <!-- centre buti (4-petal flower) -->
    <g>
      <ellipse cx="60" cy="50" rx="2.4" ry="5.4"/>
      <ellipse cx="60" cy="70" rx="2.4" ry="5.4"/>
      <ellipse cx="50" cy="60" rx="5.4" ry="2.4"/>
      <ellipse cx="70" cy="60" rx="5.4" ry="2.4"/>
      <circle cx="60" cy="60" r="2.2"/>
      <!-- diagonal accent leaves -->
      <ellipse cx="52" cy="52" rx="1.5" ry="3.4" transform="rotate(45 52 52)"/>
      <ellipse cx="68" cy="52" rx="1.5" ry="3.4" transform="rotate(-45 68 52)"/>
      <ellipse cx="52" cy="68" rx="1.5" ry="3.4" transform="rotate(-45 52 68)"/>
      <ellipse cx="68" cy="68" rx="1.5" ry="3.4" transform="rotate(45 68 68)"/>
    </g>
    <!-- corner buti (shared quarters → seamless) -->
    <g>
      <circle cx="0" cy="0" r="2.2"/><circle cx="120" cy="0" r="2.2"/>
      <circle cx="0" cy="120" r="2.2"/><circle cx="120" cy="120" r="2.2"/>
      <ellipse cx="0" cy="10" rx="2" ry="4.5"/><ellipse cx="10" cy="0" rx="4.5" ry="2"/>
      <ellipse cx="120" cy="10" rx="2" ry="4.5"/><ellipse cx="110" cy="0" rx="4.5" ry="2"/>
      <ellipse cx="0" cy="110" rx="2" ry="4.5"/><ellipse cx="10" cy="120" rx="4.5" ry="2"/>
      <ellipse cx="120" cy="110" rx="2" ry="4.5"/><ellipse cx="110" cy="120" rx="4.5" ry="2"/>
    </g>
  </g>
</svg>
